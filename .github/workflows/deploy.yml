name: Desplegar Flutter Web en GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generar estructura web faltante
        run: flutter create . --platforms web

      - name: Descargar dependencias
        run: flutter pub get

      # IMPORTANTE: el base-href debe ser EXACTAMENTE el nombre del repositorio,
      # con barra al inicio y al final. Si renombras el repo, actualiza esto.
      - name: Compilar a web
        run: flutter build web --release --base-href "/Hito-2-3-Sistemas-de-Info-Grupo-6/"

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
